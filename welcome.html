<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: transparent; /* deja ver el gradiente del index padre */
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .content-card {
      text-align: center;
      padding: 32px;
      background-color: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1rem;
      max-width: 600px;
      width: 100%;
    }

    .content-title {
      font-size: 2.25rem;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
      text-shadow:
        0 0 5px  rgba(255, 255, 255, 0.5),
        0 0 10px rgba(255, 255, 255, 0.3),
        0 0 15px rgba(255, 255, 255, 0.2);
    }

    .content-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.125rem;
      line-height: 1.75rem;
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="content-card">
    <h2 class="content-title">Bienvenido al Dashboard</h2>
    <p class="content-text">
      Este es el área principal de contenido. La barra de menú está posicionada debajo del encabezado.
    </p>
  </div>
</body>
</html>
